name: Jira Transition

on:
  workflow_run:
    workflows: ["Extract Issue from PR"]
    types: [completed]

jobs:
  transition:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Download Jira context
        uses: actions/download-artifact@v7
        with:
          name: jira-context
          path: jira-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read context
        id: context
        run: |
          ISSUE=$(cat jira-context/issue 2>/dev/null || true)
          TRANSITION_NAME=$(cat jira-context/transition_name 2>/dev/null || true)
          echo "issue=$ISSUE" >> "$GITHUB_OUTPUT"
          echo "transition_name=$TRANSITION_NAME" >> "$GITHUB_OUTPUT"

      - name: Get Transition ID
        if: steps.context.outputs.issue != '' && steps.context.outputs.transition_name != ''
        id: get_transition_name
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          ISSUE_TRANSITIONS_URL="${JIRA_BASE_URL}/rest/api/3/issue/${{ steps.context.outputs.issue }}/transitions"
          TARGET_TRANSITION_NAME="${{ steps.context.outputs.transition_name }}"

          HTTP_STATUS=$(curl --silent --show-error --write-out "%{http_code}" --output response.json \
            --user "${JIRA_EMAIL}:${JIRA_TOKEN}" \
            --request GET \
            --header "Accept: application/json" \
            "$ISSUE_TRANSITIONS_URL")

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Failed to fetch transitions. HTTP status: $HTTP_STATUS"
            echo "::group::Jira response body"
            cat response.json
            echo "::endgroup::"
            exit 1
          fi

          TRANSITION_ID=$(jq -r --arg name "$TARGET_TRANSITION_NAME" '
            .transitions // []
            | .[]
            | select(.name == $name)
            | .id
          ' response.json | head -1)

          if [ -z "$TRANSITION_ID" ]; then
            TRANSITION_NAMES=$(jq -r '
              .transitions // []
              | .[]
              | .name
            ' response.json)
            AVAILABLE=$(echo "$TRANSITION_NAMES" | paste -sd ", " -)
            echo "::error::Transition '$TARGET_TRANSITION_NAME' not found for issue ${{ steps.context.outputs.issue }}. Available: $AVAILABLE"
            exit 1
          fi

          echo "transition_id=$TRANSITION_ID" >> "$GITHUB_OUTPUT"

      - name: Transition Issue
        if: steps.context.outputs.issue != '' && steps.get_transition_name.outputs.transition_id != ''
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
        run: |
          ISSUE_TRANSITIONS_URL="${JIRA_BASE_URL}/rest/api/3/issue/${{ steps.context.outputs.issue }}/transitions"
          REQUEST_BODY="{\"transition\":{\"id\":\"${{ steps.get_transition_name.outputs.transition_id }}\"}}"

          curl --silent --user "${JIRA_EMAIL}:${JIRA_TOKEN}" \
            --request POST \
            --header "Content-Type: application/json" \
            --data "$REQUEST_BODY" \
            "$ISSUE_TRANSITIONS_URL"
