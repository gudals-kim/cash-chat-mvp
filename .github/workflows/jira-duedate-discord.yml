name: Jira Due Date 알림

on:
  schedule:
    - cron: '0 0 * * *'  # 매일 오전 9시 KST

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: D-1 마감 이슈 조회 후 Discord 전송
        run: |
          TOMORROW=$(date -d "+1 day" +%Y-%m-%d 2>/dev/null || date -v+1d +%Y-%m-%d)

          curl -s \
            -H "Authorization: Basic ${{ secrets.JIRA_AUTH }}" \
            "https://moneyfactoryslave.atlassian.net/rest/api/3/search?jql=project=CC%20AND%20duedate=$TOMORROW%20AND%20statusCategory%20!=%20Done&fields=summary,assignee,duedate,status" \
          | python3 -c "
          import sys, json, urllib.request

          d = json.load(sys.stdin)
          if d['total'] == 0:
              exit(0)

          embeds = []
          for issue in d['issues']:
              f = issue['fields']
              assignee = f['assignee']['displayName'] if f['assignee'] else '미배정'
              status = f['status']['name'] if f['status'] else '알 수 없음'
              key = issue['key']
              url = f'https://moneyfactoryslave.atlassian.net/browse/{key}'

              embeds.append({
                  'color': 15548997,
                  'title': f'⏰  마감 D-1',
                  'url': url,
                  'description': f'**[{key}] {f[\"summary\"]}**',
                  'fields': [
                      {'name': '담당자', 'value': f'\`{assignee}\`', 'inline': True},
                      {'name': '마감일', 'value': f'\`{f[\"duedate\"]}\`', 'inline': True},
                      {'name': '상태', 'value': f'\`{status}\`', 'inline': True}
                  ],
                  'footer': {'text': 'Cash Chat · Jira 자동 알림'},
              })

          payload = json.dumps({
              'content': f'> 📋  **내일 마감인 이슈 {d[\"total\"]}개** 가 있어요!',
              'embeds': embeds
          })

          req = urllib.request.Request(
              '${{ secrets.DISCORD_WEBHOOK }}',
              data=payload.encode(),
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          urllib.request.urlopen(req)
          "
