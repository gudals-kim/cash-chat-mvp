name: Android Build Check

on:
  pull_request:
    branches: [ dev ]
    paths:
      - 'apps/frontend/**'

jobs:
  build-check:
    if: github.repository == 'cash-chat-mvp/cash-chat-mvp'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/frontend/**/*.gradle.kts', 'apps/frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK (검증용)
        run: ./gradlew :app:assembleDebug

      # PR에 빌드 결과 댓글
      - name: 빌드 성공 Discord 알림
        if: success()
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_REF: ${{ github.head_ref }}
          ACTOR: ${{ github.actor }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg branch "$HEAD_REF" \
            --arg actor "$ACTOR" \
            '{embeds: [{
              color: 5763719,
              title: "✅  PR 빌드 검증 통과",
              description: ("**[" + $title + "](" + $url + ")**"),
              fields: [
                {name: "브랜치", value: ("`" + $branch + "` → `dev`"), inline: true},
                {name: "작성자", value: ("`" + $actor + "`"), inline: true}
              ],
              footer: {text: "Cash Chat · Android Build Check"}
            }]}')
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

      - name: 빌드 실패 Discord 알림
        if: failure()
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_REF: ${{ github.head_ref }}
          ACTOR: ${{ github.actor }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg url "$PR_URL" \
            --arg branch "$HEAD_REF" \
            --arg actor "$ACTOR" \
            --arg run_url "$RUN_URL" \
            '{embeds: [{
              color: 15548997,
              title: "🚨  PR 빌드 검증 실패",
              description: ("**[" + $title + "](" + $url + ")**"),
              fields: [
                {name: "브랜치", value: ("`" + $branch + "` → `dev`"), inline: true},
                {name: "작성자", value: ("`" + $actor + "`"), inline: true},
                {name: "로그 확인", value: ("[Actions 로그 바로가기](" + $run_url + ")"), inline: false}
              ],
              footer: {text: "Cash Chat · Android Build Check"}
            }]}')
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
