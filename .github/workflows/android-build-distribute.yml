name: Android Build & Distribute

on:
  push:
    branches: [ dev ]        # ← PR 머지 후에만 실행
    paths:
      - 'apps/frontend/**'

jobs:
  build-and-distribute:
    if: github.repository == 'cash-chat-mvp/cash-chat-mvp'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/frontend

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('apps/frontend/**/*.gradle.kts', 'apps/frontend/gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > cashchat-release.keystore

      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: Write Firebase Service Account
        env:
          FIREBASE_SA: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: printenv FIREBASE_SA > service-account.json

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Fastlane distribute
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/apps/frontend/cashchat-release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          RELEASE_NOTES: |
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            ${{ github.event.head_commit.message }}
        run: bundle exec fastlane android distribute

      - name: Discord 배포 성공 알림
        if: success()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "color": 5763719,
                "title": "✅  Android 배포 완료",
                "description": "**Firebase App Distribution 배포 성공**",
                "fields": [
                  {"name": "브랜치", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "배포자", "value": "`${{ github.actor }}`", "inline": true},
                  {"name": "커밋 메시지", "value": "`${{ github.event.head_commit.message }}`", "inline": false}
                ],
                "footer": {"text": "Cash Chat · Android Build"},
                "timestamp": "${{ github.event.head_commit.timestamp }}"
              }]
            }'

      - name: Discord 배포 실패 알림
        if: failure()
        run: |
          curl -X POST "${{ secrets.DISCORD_WEBHOOK }}" \
            -H "Content-Type: application/json" \
            -d '{
              "embeds": [{
                "color": 15548997,
                "title": "🚨  Android 빌드/배포 실패",
                "description": "**`dev` 브랜치 빌드 또는 Firebase 배포가 실패했어요**",
                "fields": [
                  {"name": "브랜치", "value": "`${{ github.ref_name }}`", "inline": true},
                  {"name": "실패자", "value": "`${{ github.actor }}`", "inline": true},
                  {"name": "커밋 메시지", "value": "`${{ github.event.head_commit.message }}`", "inline": false},
                  {"name": "로그 확인", "value": "[Actions 로그 바로가기](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})", "inline": false}
                ],
                "footer": {"text": "Cash Chat · Android Build"}
              }]
            }'
